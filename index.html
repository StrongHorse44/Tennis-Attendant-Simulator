<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Court Call — Tennis Attendant Simulator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #2d5a3d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading-screen h1 {
      font-family: 'Georgia', serif;
      color: #f4e8c1;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
    }
    #loading-screen p {
      font-family: 'Georgia', serif;
      color: #c4b896;
      font-size: 1rem;
    }
    #loading-bar-container {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin-top: 1.5rem;
      overflow: hidden;
    }
    #loading-bar {
      width: 0%;
      height: 100%;
      background: #f4e8c1;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h1>Court Call</h1>
    <p>Tennis Attendant Simulator</p>
    <div id="loading-bar-container">
      <div id="loading-bar"></div>
    </div>
  </div>
  <canvas id="game-canvas"></canvas>
  <div id="ui-root"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
